<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Garage İstanbul Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#09090b" />
<link rel="apple-touch-icon" href="/logo.png" />
<style>
body{margin:0;background:#09090b;color:white;font-family:Arial,sans-serif} canvas{touch-action:none;background:white;border-radius:14px} input,textarea,select{outline:none} .card{border:1px solid rgba(255,255,255,.1);background:rgba(24,24,27,.9);border-radius:22px;padding:16px}.btn{border-radius:14px;padding:10px 14px;font-weight:700}.field{width:100%;border:1px solid rgba(255,255,255,.12);background:#09090b;border-radius:14px;padding:10px 12px;color:white}.label{font-size:12px;color:#d4d4d8;margin-bottom:6px;display:block}.choice.active-yes{background:#16a34a!important}.choice.active-no{background:#dc2626!important}.thumb{width:100%;max-height:190px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.15)}@media print{.no-print{display:none!important}@page{size:A5 portrait;margin:5mm}body{background:white;color:black}.print-page{color:black!important;background:white!important}.print-box{border:1px solid #bbb!important;background:white!important;color:black!important}.print-img{max-height:85px;object-fit:cover}.print-sign{max-height:45px;object-fit:contain}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API_URL = "/api/kayit";
const CHECK_ITEMS = [
"İş emri ile araç plakası uyumlu mu?","Müşteri şikayetleri ve özel istekler not edilmiş mi?","Araç içi/dışı mevcut hasar kayıtları kontrol edildi mi?","Montajı yapılan aksesuarların yerleşimi simetrik ve nizami mi?","Sabitleme elemanları sağlam mı?","Gövde ile aksesuar arasında boşluk veya kasılma var mı?","Hareketli parçaların çalışmasına engel bir durum var mı?","Kablo tesisatı uygun ve izole edilmiş mi?","Elektrikli aksesuarların fonksiyonları tam mı?","Sigorta değerleri ve bağlantı noktaları kontrol edildi mi?","Gösterge panelinde arıza lambası yanıyor mu?","Montaj sonrası temizlik yapıldı mı?","Araç yüzeyinde yeni çizik veya deformasyon var mı?","Koruyucu kılıflar çıkarıldı mı?","Garanti belgeleri ve kullanım kılavuzları hazırlandı mı?","Değişen veya çıkan eski parçalar müşteriye hazırlanmış mı?"
];
const STATUS_OPTIONS=["Beklemede","Montaj Sürecinde","Montaj Bitti","Montaj İptal Oldu","Garantiye Gitti"];
let requestQueue=Promise.resolve();
function enqueue(task){requestQueue=requestQueue.then(task).catch(e=>{console.error(e);throw e});return requestQueue;}
const emptyForm=()=>({MusteriAdi:"",Telefon:"",Plaka:"",SasiNo:"",AracMarka:"",AracModel:"",AracTip:"",YapilacakIslem:[{name:"",fee:""}],Ucret:0,Notlar:"",Durum:"Beklemede",Fotograf:"",Teknisyen:"",AracKusurlari:"",Imza:"",UstaImza:"",KvkkOnay:false,MusteriOnay:false});
const state={tab:"kayit",records:[],loading:false,saving:false,editId:null,selectedId:null,search:"",date:new Date().toISOString().slice(0,10),form:emptyForm(),controlId:null,controlAnswers:{},controlNotes:{},controlFinalPhoto:"",controlNote:"",company:{name:"Garage İstanbul Oto Aksesuar",phone:"0 (540) 715 34 34",email:"garageistanbul.satis@gmail.com",address:"CUMHURİYET MAH. 676 SOK. NO:85 MURATPAŞA / ANTALYA"}};
const $=s=>document.querySelector(s); const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
function money(v){return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY"}).format(Number(v||0))} function dt(v){return v?new Date(v).toLocaleString("tr-TR"):"-"}
function opsTotal(ops){return (ops||[]).reduce((s,o)=>s+Number(o.fee||0),0)}
function cleanOps(){return [...document.querySelectorAll("[data-op-row]")].map(row=>({name:row.querySelector("[data-op-name]").value.trim(),fee:Number(row.querySelector("[data-op-fee]").value||0)})).filter(o=>o.name)}
async function apiGet(params){const res=await fetch(API_URL+"?"+new URLSearchParams(params),{cache:"no-store"});const d=await res.json();if(!res.ok||!d.success)throw new Error(d.message||"API hata");return d}
async function apiPost(body){return enqueue(async()=>{const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body),cache:"no-store"});const d=await res.json();if(!res.ok||!d.success)throw new Error(d.message||"API hata");return d})}
async function load(){try{state.loading=true;render();const d=await apiGet({action:"list",date:state.date,limit:300,q:state.search||""});state.records=d.records||[]}catch(e){alert("Liste alınamadı: "+e.message)}finally{state.loading=false;render()}}
async function fileToBase64(file,max=1000,q=.65){return new Promise((resolve,reject)=>{if(!file)return resolve("");const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>max){h=Math.round(h*max/w);w=max}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",q))};img.onerror=reject;img.src=r.result};r.onerror=reject;r.readAsDataURL(file)})}
function bindSignature(id,key){const c=document.getElementById(id);if(!c)return;const ctx=c.getContext("2d");function resize(){const ratio=window.devicePixelRatio||1;const rect=c.getBoundingClientRect();c.width=rect.width*ratio;c.height=180*ratio;ctx.scale(ratio,ratio);ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#111"}resize();let down=false,last=null;const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}};function start(e){down=true;last=pos(e)}function move(e){if(!down)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;state.form[key]=c.toDataURL("image/png")}function end(){down=false;state.form[key]=c.toDataURL("image/png")}c.onmousedown=start;c.onmousemove=move;c.onmouseup=end;c.onmouseleave=end;c.ontouchstart=start;c.ontouchmove=move;c.ontouchend=end;}
function clearSig(key){state.form[key]="";render()}
function updateForm(k,v){state.form[k]=v}
function addOp(){state.form.YapilacakIslem.push({name:"",fee:""});render()} function removeOp(i){state.form.YapilacakIslem.splice(i,1); if(!state.form.YapilacakIslem.length)addOp(); else render()}
async function saveRecord(){try{if(state.saving)return;const ops=cleanOps();Object.assign(state.form,{YapilacakIslem:ops,Ucret:opsTotal(ops)});if(!state.form.MusteriAdi||!state.form.Telefon||!state.form.AracMarka||!state.form.AracModel||!ops.length){alert("Müşteri, telefon, marka, model ve en az 1 işlem şart knk.");return}if(!state.form.KvkkOnay||!state.form.MusteriOnay){alert("Onay kutularını işaretlemen gerekiyor.");return}state.saving=true;render();const body={...(state.form),action:state.editId?"update":"add"};if(state.editId)body.ID=state.editId;const d=await apiPost(body);state.form=emptyForm();state.editId=null;state.tab="liste";await load()}catch(e){alert("Kayıt kaydedilemedi: "+e.message)}finally{state.saving=false;render()}}
function editRecord(id){const r=state.records.find(x=>x.ID===id); if(!r)return; state.editId=id; state.form={MusteriAdi:r.MusteriAdi||"",Telefon:r.Telefon||"",Plaka:r.Plaka||"",SasiNo:r.SasiNo||"",AracMarka:r.AracMarka||"",AracModel:r.AracModel||"",AracTip:r.AracTip||"",YapilacakIslem:Array.isArray(r.YapilacakIslem)?r.YapilacakIslem:[{name:"",fee:""}],Ucret:r.Ucret||0,Notlar:r.Notlar||"",Durum:r.Durum||"Beklemede",Fotograf:r.Fotograf||"",FinalFotograf:r.FinalFotograf||"",Teknisyen:r.Teknisyen||"",AracKusurlari:r.AracKusurlari||"",Imza:r.Imza||"",UstaImza:r.UstaImza||"",KvkkOnay:!!r.KvkkOnay,MusteriOnay:!!r.MusteriOnay};state.tab="kayit";render();scrollTo(0,0)}
function openControl(id){const r=state.records.find(x=>x.ID===id);if(!r)return;state.controlId=id;state.controlAnswers={};state.controlNotes={};(r.KontrolJSON||[]).forEach((x,i)=>{state.controlAnswers[i]=x.answer||"";state.controlNotes[i]=x.note||""});state.controlFinalPhoto=r.FinalFotograf||"";state.controlNote=r.KontrolNotu||"";state.tab="kontrol";render();scrollTo(0,0)}
async function saveControl(){try{const r=state.records.find(x=>x.ID===state.controlId);if(!r)return;const list=CHECK_ITEMS.map((label,i)=>({label,answer:state.controlAnswers[i]||"",note:document.getElementById("cnote-"+i)?.value.trim()||""}));const empty=list.filter(x=>!x.answer).length;if(empty && !confirm(empty+" soru boş. Yine de kaydedilsin mi?"))return;state.saving=true;render();await apiPost({action:"saveControl",ID:r.ID,KontrolJSON:list,KontrolNotu:state.controlNote,FinalFotograf:state.controlFinalPhoto,Durum:"Montaj Bitti"});state.tab="liste";await load()}catch(e){alert("Kontrol kaydedilemedi: "+e.message)}finally{state.saving=false;render()}}
async function delRecord(id){if(!confirm("Kaydı silmek istediğine emin misin?"))return;await apiPost({action:"delete",ID:id});await load()}
function rows(){return state.records.filter(r=>{const q=state.search.toLowerCase().trim();if(!q)return true;return [r.KayitNo,r.MusteriAdi,r.Telefon,r.Plaka,r.AracMarka,r.AracModel,r.Teknisyen,r.Durum].join(" ").toLowerCase().includes(q)})}
function printRecord(id){const r=state.records.find(x=>x.ID===id);if(!r)return;const ops=(r.YapilacakIslem||[]).map(o=>`<div class="flex justify-between border-b border-dashed border-zinc-300 py-1"><span>${esc(o.name)}</span><b>${money(o.fee)}</b></div>`).join("");const kontrol=(r.KontrolJSON||[]).map((x,i)=>`<div style="font-size:8px;border-bottom:1px solid #ddd;padding:2px 0"><b>${i+1}. ${esc(x.label)}</b> - ${esc(x.answer||"-")} ${x.note?" / "+esc(x.note):""}</div>`).join("");const w=open("","_blank","width=800,height=1100");w.document.write(`<!doctype html><html><head><title>${esc(r.KayitNo||r.recordNo)}</title><script src="https://cdn.tailwindcss.com"><\/script><style>@page{size:A5 portrait;margin:5mm}body{font-family:Arial;font-size:10px}.box{border:1px solid #ccc;border-radius:8px;padding:6px;margin-bottom:5px}.img{width:100%;max-height:85px;object-fit:cover}.sign{max-height:45px;width:100%;object-fit:contain}</style></head><body><button onclick="print()" style="padding:10px;margin-bottom:8px">Yazdır</button><div class="box grid grid-cols-[70px_1fr] gap-2"><img src="/logo.png" style="width:68px"><div><h2>${state.company.name}</h2><div>${state.company.phone} · ${state.company.email}</div><div>${state.company.address}</div></div></div><div class="box"><b>Araç Kabul + Montaj Kontrol Fişi</b><br>Kayıt: ${esc(r.KayitNo||r.recordNo)}<br>Tarih: ${dt(r.TarihSaat)}<br>Durum: ${esc(r.Durum)} · Usta: ${esc(r.Teknisyen||"-")}</div><div class="grid grid-cols-2 gap-1"><div class="box"><b>Müşteri</b><br>${esc(r.MusteriAdi)}<br>${esc(r.Telefon)}</div><div class="box"><b>Araç</b><br>${esc(r.Plaka)}<br>${esc(r.AracMarka)} ${esc(r.AracModel)} ${esc(r.AracTip||"")}<br>Şasi: ${esc(r.SasiNo||"-")}</div></div><div class="grid grid-cols-2 gap-1"><div class="box"><b>İşlemler</b>${ops}<div class="flex justify-between mt-1"><b>Toplam</b><b>${money(r.Ucret)}</b></div></div><div class="box"><b>Not / Kusur</b><br>${esc(r.AracKusurlari||"-")}<br>${esc(r.Notlar||"")}</div></div><div class="grid grid-cols-2 gap-1"><div class="box"><b>Araç Kabul Foto</b>${r.Fotograf?`<img class="img" src="${r.Fotograf}">`:"-"}</div><div class="box"><b>Son Kontrol Foto</b>${r.FinalFotograf?`<img class="img" src="${r.FinalFotograf}">`:"-"}</div></div><div class="grid grid-cols-2 gap-1"><div class="box"><b>Müşteri İmza</b>${r.Imza?`<img class="sign" src="${r.Imza}">`:"-"}</div><div class="box"><b>Usta İmza</b>${r.UstaImza?`<img class="sign" src="${r.UstaImza}">`:"-"}</div></div><div class="box"><b>Kontrol Listesi</b>${kontrol||"Kontrol yapılmadı."}</div></body></html>`);w.document.close()}
function render(){const app=$("#app");const r=state.records.find(x=>x.ID===state.controlId);const list=rows();const active="bg-white text-black", passive="text-white hover:bg-white/10";app.innerHTML=`<div class="min-h-screen"><header class="border-b border-white/10 bg-black/70 p-4 text-center"><img src="/logo.png" class="mx-auto max-w-[340px] w-full"><div class="tracking-[.25em] text-xs text-zinc-300">ARAÇ KABUL & MONTAJ KONTROL</div></header><main class="mx-auto max-w-7xl p-4 md:p-6"><div class="no-print mb-4 grid grid-cols-3 gap-2 rounded-2xl bg-zinc-900 p-1"><button class="btn ${state.tab==='kayit'?active:passive}" onclick="state.tab='kayit';render()">Yeni Kayıt</button><button class="btn ${state.tab==='liste'?active:passive}" onclick="state.tab='liste';load()">Kayıtlar</button><button class="btn ${state.tab==='kontrol'?active:passive}" onclick="state.tab='kontrol';render()">Kontrol</button></div>${state.loading?`<div class="card mb-4">Veriler güncelleniyor...</div>`:""}${state.tab==='kayit'?renderForm():""}${state.tab==='liste'?renderList(list):""}${state.tab==='kontrol'?renderControl(r):""}</main></div>`; if(state.tab==='kayit'){setTimeout(()=>{bindSignature('musteriSig','Imza');bindSignature('ustaSig','UstaImza')},50)}}
function renderForm(){const f=state.form;return `<div class="grid gap-4 xl:grid-cols-[1.4fr_.6fr]"><section class="card"><h2 class="text-xl font-bold mb-4">${state.editId?"Kayıt Düzenle":"Araç Kabul Formu"}</h2><div class="grid gap-3 md:grid-cols-2">${input('Müşteri Ad Soyadı *','MusteriAdi',f.MusteriAdi)}${input('Telefon *','Telefon',f.Telefon)}${input('Plaka','Plaka',f.Plaka)}${input('Şasi No','SasiNo',f.SasiNo)}${input('Araç Marka *','AracMarka',f.AracMarka)}${input('Araç Model *','AracModel',f.AracModel)}${input('Araç Tip','AracTip',f.AracTip)}<div><label class="label">Durum</label><select class="field" onchange="updateForm('Durum',this.value)">${STATUS_OPTIONS.map(s=>`<option ${f.Durum===s?'selected':''}>${s}</option>`).join('')}</select></div></div><div class="mt-4"><label class="label">Yapılacak İşlemler</label><div class="space-y-2">${(f.YapilacakIslem||[]).map((o,i)=>`<div data-op-row class="grid grid-cols-[1fr_120px_44px] gap-2"><input data-op-name class="field" value="${esc(o.name||'')}" placeholder="İşçilik / Cam filmi"><input data-op-fee class="field" type="number" value="${esc(o.fee||'')}" placeholder="Ücret"><button class="btn bg-red-600" onclick="removeOp(${i})">×</button></div>`).join('')}</div><button class="btn mt-2 bg-zinc-700" onclick="addOp()">+ Satır Ekle</button></div><div class="grid gap-3 md:grid-cols-2 mt-4"><div><label class="label">Araç Kabul Fotoğrafı</label><input type="file" accept="image/*" capture="environment" class="field" onchange="fileToBase64(this.files[0]).then(x=>{state.form.Fotograf=x;render()})">${f.Fotograf?`<img src="${f.Fotograf}" class="thumb mt-2">`:''}</div><div>${area('Araç Kusurları','AracKusurlari',f.AracKusurlari)}${area('Notlar','Notlar',f.Notlar)}</div></div><div class="grid gap-3 md:grid-cols-2 mt-4"><div><label class="label">Müşteri İmzası</label>${f.Imza?`<img class="bg-white rounded-xl h-[90px] object-contain w-full" src="${f.Imza}">`: '<canvas id="musteriSig" class="w-full h-[180px]"></canvas>'}<button class="btn mt-2 bg-zinc-700" onclick="clearSig('Imza')">Temizle</button></div><div><label class="label">Usta Adı</label><input class="field mb-2" value="${esc(f.Teknisyen)}" onchange="updateForm('Teknisyen',this.value)"><label class="label">Usta İmzası</label>${f.UstaImza?`<img class="bg-white rounded-xl h-[90px] object-contain w-full" src="${f.UstaImza}">`: '<canvas id="ustaSig" class="w-full h-[180px]"></canvas>'}<button class="btn mt-2 bg-zinc-700" onclick="clearSig('UstaImza')">Temizle</button></div></div><div class="mt-4 space-y-2"><label class="flex gap-2"><input type="checkbox" ${f.MusteriOnay?'checked':''} onchange="updateForm('MusteriOnay',this.checked)"> Müşteri onayı alındı</label><label class="flex gap-2"><input type="checkbox" ${f.KvkkOnay?'checked':''} onchange="updateForm('KvkkOnay',this.checked)"> KVKK onayı alındı</label></div><button class="btn mt-4 w-full bg-green-500 text-black" ${state.saving?'disabled':''} onclick="saveRecord()">${state.saving?'Kaydediliyor...':state.editId?'Güncelle':'Kaydı Aç'}</button></section><aside class="card"><h3 class="font-bold mb-2">Mantık</h3><p class="text-sm text-zinc-300">Kayıt buradan açılır. Aynı kayıt Kontrol sekmesinde işaretlenir. Çıktıda araç kabul fotoğrafı + son kontrol fotoğrafı beraber görünür.</p></aside></div>`}
function input(label,key,val){return `<div><label class="label">${label}</label><input class="field" value="${esc(val)}" onchange="updateForm('${key}',this.value)"></div>`} function area(label,key,val){return `<label class="label mt-2">${label}</label><textarea class="field min-h-[80px]" onchange="updateForm('${key}',this.value)">${esc(val)}</textarea>`}
function renderList(list){return `<section class="card"><div class="flex flex-col md:flex-row gap-2 md:items-end mb-4"><div class="flex-1"><label class="label">Arama</label><input class="field" value="${esc(state.search)}" placeholder="Plaka, müşteri, telefon" oninput="state.search=this.value"></div><div><label class="label">Tarih</label><input class="field" type="date" value="${state.date}" onchange="state.date=this.value"></div><button class="btn bg-blue-600" onclick="load()">Getir</button></div><div class="grid gap-3">${list.map(r=>`<div class="rounded-2xl border border-white/10 bg-black/30 p-4"><div class="flex flex-col md:flex-row md:items-center justify-between gap-3"><div><b>${esc(r.Plaka||'-')} · ${esc(r.MusteriAdi||'-')}</b><div class="text-xs text-zinc-400">${esc(r.KayitNo||r.recordNo)} · ${dt(r.TarihSaat)} · ${esc(r.AracMarka||'')} ${esc(r.AracModel||'')} · ${esc(r.Durum||'')}</div><div class="text-sm text-zinc-300">Usta: ${esc(r.Teknisyen||'-')} · Toplam: ${money(r.Ucret)}</div></div><div class="flex flex-wrap gap-2"><button class="btn bg-zinc-700" onclick="editRecord('${r.ID}')">Düzenle</button><button class="btn bg-amber-500 text-black" onclick="openControl('${r.ID}')">Kontrol</button><button class="btn bg-white text-black" onclick="printRecord('${r.ID}')">Fiş</button><button class="btn bg-red-600" onclick="delRecord('${r.ID}')">Sil</button></div></div></div>`).join('')||'<div class="text-zinc-400">Kayıt yok.</div>'}</div></section>`}
function renderControl(r){if(!r)return `<section class="card"><h2 class="text-xl font-bold">Montaj Kontrol</h2><p class="text-zinc-400 mt-2">Önce Kayıtlar sekmesinden bir kayıt seçip Kontrol butonuna bas knk.</p></section>`;return `<section class="card"><h2 class="text-xl font-bold mb-3">Montaj Kontrol · ${esc(r.Plaka||'')}</h2><div class="grid gap-3 md:grid-cols-3 mb-4"><div class="rounded-2xl bg-black/30 p-3"><b>${esc(r.MusteriAdi)}</b><br><span class="text-sm text-zinc-400">${esc(r.Telefon||'')}</span></div><div class="rounded-2xl bg-black/30 p-3">${esc(r.AracMarka||'')} ${esc(r.AracModel||'')}<br><span class="text-sm text-zinc-400">Usta: ${esc(r.Teknisyen||'-')}</span></div><div class="rounded-2xl bg-black/30 p-3">Kayıt: ${esc(r.KayitNo||r.recordNo)}<br><span class="text-sm text-zinc-400">${dt(r.TarihSaat)}</span></div></div><div class="grid gap-3 md:grid-cols-3 mb-4">${r.Fotograf?`<div><label class="label">Kabul Foto</label><img class="thumb" src="${r.Fotograf}"></div>`:''}${r.Imza?`<div><label class="label">Müşteri İmza</label><img class="bg-white rounded-xl h-[130px] object-contain w-full" src="${r.Imza}"></div>`:''}${r.UstaImza?`<div><label class="label">Usta İmza</label><img class="bg-white rounded-xl h-[130px] object-contain w-full" src="${r.UstaImza}"></div>`:''}</div><div class="space-y-3">${CHECK_ITEMS.map((x,i)=>`<div class="rounded-2xl border border-white/10 bg-black/25 p-3"><b>${i+1}. ${esc(x)}</b><div class="grid grid-cols-2 gap-2 mt-2"><button class="btn choice ${state.controlAnswers[i]==='Evet'?'active-yes':'bg-zinc-700'}" onclick="state.controlAnswers[${i}]='Evet';render()">Evet</button><button class="btn choice ${state.controlAnswers[i]==='Hayır'?'active-no':'bg-zinc-700'}" onclick="state.controlAnswers[${i}]='Hayır';render()">Hayır</button></div><textarea id="cnote-${i}" class="field mt-2" placeholder="Açıklama">${esc(state.controlNotes[i]||'')}</textarea></div>`).join('')}</div><div class="grid gap-3 md:grid-cols-2 mt-4"><div><label class="label">Son Kontrol Fotoğrafı</label><input type="file" accept="image/*" capture="environment" class="field" onchange="fileToBase64(this.files[0]).then(x=>{state.controlFinalPhoto=x;render()})">${state.controlFinalPhoto?`<img class="thumb mt-2" src="${state.controlFinalPhoto}">`:''}</div><div><label class="label">Kontrol Notu</label><textarea class="field min-h-[120px]" onchange="state.controlNote=this.value">${esc(state.controlNote||'')}</textarea></div></div><button class="btn mt-4 w-full bg-green-500 text-black" onclick="saveControl()">${state.saving?'Kaydediliyor...':'Kontrolü Kaydet ve Montaj Bitti Yap'}</button></section>`}
window.addEventListener('load',()=>{render();load(); if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')});
</script>
</body>
</html>
